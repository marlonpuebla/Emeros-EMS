<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Credential File — Emeros EHR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ================================================================
   GLOBAL / RESET
================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #1e4d3b;
  --green-light: #e8f0ec;
  --green-mid: #2d6b53;
  --ink: #1a1714;
  --gray: #5c5c5c;
  --gray-light: #999;
  --border: #ccc;
  --bg: #f5f5f5;
}

@page {
  size: letter;
  margin: 0.6in 0.65in;
}

html, body {
  font-family: 'DM Sans', 'Georgia', serif;
  font-size: 10.5pt;
  line-height: 1.4;
  color: var(--ink);
  background: var(--bg);
}

/* ================================================================
   SCREEN-ONLY: TOOLBAR
================================================================ */
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: var(--green); color: #fff;
  display: flex; align-items: center; gap: 12px;
  padding: 10px 24px; box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.toolbar h1 { font-size: 15px; font-weight: 600; flex: 1; }
.toolbar button {
  background: #fff; color: var(--green); border: none;
  padding: 8px 20px; border-radius: 6px; font-weight: 600;
  font-family: inherit; cursor: pointer; font-size: 13px;
}
.toolbar button:hover { background: var(--green-light); }
.toolbar .status { font-size: 12px; opacity: .85; }

body { padding-top: 56px; }

@media print {
  .toolbar, .no-print, .sig-drawer, .btn-apply-sig, .upload-modal-overlay { display: none !important; }
  body { padding-top: 0; background: #fff; font-size: 10pt; line-height: 1.35; }
  .doc-section {
    box-shadow: none !important;
    margin: 0 !important;
    padding: 0 !important;
    max-width: none !important;
    width: 100% !important;
  }
  .sig-block-area { page-break-inside: avoid !important; }
  .signature-block { page-break-inside: avoid; }
  .page-header { margin-bottom: 10px; padding-bottom: 6px; }
  .page-header .org-name { font-size: 14pt; }
  .page-header .org-address, .page-header .org-phone { font-size: 8.5pt; }
  .page-footer { margin-top: 16px; }
  .form-section { page-break-inside: avoid; }
  .doc-title { font-size: 12pt; margin-bottom: 12px; }
  .section-title { font-size: 9pt; margin-bottom: 6px; }
  .legal-text { font-size: 9pt; line-height: 1.35; margin-bottom: 6px; }
  .field-row { margin-bottom: 4px; }
  .field-input { min-height: 18px; }
  .form-table { font-size: 8.5pt; }
  .form-table th { padding: 3px 5px; font-size: 7.5pt; }
  .form-table td { padding: 3px 5px; }
}

/* ================================================================
   DOCUMENT SECTIONS (flat, no nesting)
================================================================ */
.doc-section {
  background: #fff;
  max-width: 8.5in;
  margin: 24px auto;
  padding: 0.6in 0.65in;
  box-shadow: 0 1px 6px rgba(0,0,0,.12);
  page-break-before: always;
  position: relative;
}
.doc-section:first-child { page-break-before: auto; }

/* ================================================================
   PAGE HEADER
================================================================ */
.page-header {
  text-align: center;
  padding-bottom: 10px;
  margin-bottom: 18px;
  border-bottom: 2px solid var(--green);
}
.page-header .org-name {
  font-size: 16pt; font-weight: 700; color: var(--green);
  margin-bottom: 2px; letter-spacing: 0.3px;
}
.page-header .org-address {
  font-size: 9pt; color: var(--gray); margin-bottom: 1px;
}
.page-header .org-phone {
  font-size: 9pt; color: var(--gray);
}

/* ================================================================
   PAGE FOOTER
================================================================ */
.page-footer {
  text-align: center; font-size: 8pt; color: var(--gray-light);
  border-top: 1px solid #e0e0e0; padding-top: 6px;
  margin-top: 30px;
}

/* ================================================================
   DOCUMENT TITLE
================================================================ */
.doc-title {
  font-size: 14pt; font-weight: 700; color: var(--green);
  text-align: center; margin-bottom: 16px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.doc-subtitle {
  font-size: 10pt; color: var(--gray); text-align: center;
  margin-top: -10px; margin-bottom: 16px;
}
.doc-title-sm {
  font-size: 11pt; font-weight: 700; color: var(--green);
  text-align: center; margin-bottom: 12px;
  text-transform: uppercase; letter-spacing: 0.4px;
}

/* ================================================================
   FORM ELEMENTS
================================================================ */
.form-section {
  margin-bottom: 10px;
}
.section-title {
  font-size: 10pt; font-weight: 700; color: var(--green);
  text-transform: uppercase; letter-spacing: 0.4px;
  border-bottom: 1px solid var(--green-light);
  padding-bottom: 3px; margin-bottom: 8px;
}
.field-row {
  display: flex; gap: 12px; margin-bottom: 6px;
  flex-wrap: wrap;
}
.field {
  flex: 1; min-width: 0;
}
.field-label {
  font-size: 8pt; font-weight: 600; color: var(--gray);
  text-transform: uppercase; letter-spacing: 0.3px;
  margin-bottom: 2px;
}
.field-input {
  border-bottom: 1px solid var(--border);
  min-height: 22px; font-size: 10pt;
  padding: 2px 0; color: var(--ink);
  word-break: break-word;
}
.field-input.filled { color: var(--green); font-weight: 500; }

/* Checkboxes */
.checkbox-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px; font-size: 10pt;
}
.checkbox-box {
  display: inline-block; width: 13px; height: 13px;
  border: 1.5px solid var(--ink); border-radius: 2px;
  flex-shrink: 0; text-align: center; line-height: 11px;
  font-size: 9px; font-weight: 700;
}

/* Tables */
.form-table {
  width: 100%; border-collapse: collapse; margin-bottom: 10px;
  font-size: 9.5pt;
}
.form-table th {
  background: var(--green-light); color: var(--green);
  font-weight: 600; font-size: 8pt; text-transform: uppercase;
  letter-spacing: 0.3px; padding: 5px 6px; text-align: left;
  border: 1px solid #d0d0d0;
}
.form-table td {
  padding: 4px 6px; border: 1px solid #d0d0d0;
  min-height: 20px; vertical-align: top;
}

/* Legal / paragraph text */
.legal-text {
  font-size: 9.5pt; line-height: 1.4; margin-bottom: 8px;
  text-align: justify;
}
.legal-text.small { font-size: 8.5pt; line-height: 1.35; }
.legal-text.indent { padding-left: 18px; }

.list-alpha { list-style-type: lower-alpha; padding-left: 24px; }
.list-alpha li { margin-bottom: 3px; font-size: 9.5pt; }
.list-roman { list-style-type: lower-roman; padding-left: 24px; }
.list-roman li { margin-bottom: 3px; font-size: 9.5pt; }

.numbered-list { padding-left: 20px; }
.numbered-list li { margin-bottom: 5px; font-size: 9.5pt; }

.bullet-list { padding-left: 20px; list-style: disc; }
.bullet-list li { margin-bottom: 4px; font-size: 9.5pt; }

/* ================================================================
   SIGNATURE LINES (new global-pad approach)
================================================================ */
.sig-line {
  margin-bottom: 4px;
}
.sig-placeholder { min-height: 32px; border-bottom: 1px solid var(--ink); display: flex; align-items: flex-end; padding-bottom: 4px; }
.sig-applied { min-height: 32px; border-bottom: 1px solid var(--ink); display: flex; align-items: flex-end; gap: 8px; padding-bottom: 2px; }
.sig-applied img.sig-img { height: 38px; }
.sig-applied .sig-verify { font-family: 'Courier New', monospace; font-size: 7.5pt; color: var(--gray-light); letter-spacing: 0.3px; }
.sig-label { font-size: 8pt; font-weight: 600; color: var(--gray); text-transform: uppercase; margin-top: 2px; }
.date-line { margin-bottom: 10px; }
.date-line .field-input { min-height: 20px; border-bottom: 1px solid var(--ink); font-size: 10pt; }

/* Signature block area — never split across pages */
.sig-block-area {
  page-break-inside: avoid;
  margin-top: 16px;
  padding-top: 10px;
  border-top: 1px solid #e0e0e0;
}
.sig-row-pair {
  display: flex; gap: 24px; margin-bottom: 8px;
}
.sig-row-pair > div { flex: 1; }

/* Keep footer at bottom of printed page */
@media print {
  .doc-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .doc-content { flex: 1; }
}

.btn-apply-sig {
  font-family: inherit; font-size: 11px; padding: 4px 14px;
  background: var(--green); color: #fff; border: none;
  border-radius: 4px; cursor: pointer; font-weight: 600;
}
.btn-apply-sig:hover { background: var(--green-mid); }

.signature-block { margin-top: 10px; margin-bottom: 6px; }
.sig-block-area .signature-block { margin-top: 8px; margin-bottom: 4px; }
.signature-pair { display: flex; gap: 20px; }
.signature-pair .sig-col { flex: 1; }
.signature-pair .date-col { flex: 0 0 180px; }

/* ================================================================
   SIGNATURE DRAWER (floating, fixed at bottom)
================================================================ */
.sig-drawer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 3px solid var(--green);
  box-shadow: 0 -4px 20px rgba(0,0,0,.15);
  padding: 12px 24px; z-index: 900;
  display: flex; align-items: center; gap: 16px;
  transition: transform 0.3s ease;
}
.sig-drawer.collapsed { transform: translateY(calc(100% - 40px)); }
.sig-drawer .drawer-toggle {
  position: absolute; top: -32px; right: 24px;
  background: var(--green); color: #fff; border: none;
  padding: 6px 16px; border-radius: 6px 6px 0 0;
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer;
}
.sig-drawer canvas {
  border: 1px dashed var(--border); border-radius: 4px;
  cursor: crosshair; background: #fafafa; flex-shrink: 0;
}
.sig-drawer .drawer-actions {
  display: flex; flex-direction: column; gap: 6px;
}
.sig-drawer .drawer-actions button {
  font-family: inherit; font-size: 12px; padding: 6px 18px;
  border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; background: #fff; font-weight: 600;
}
.sig-drawer .drawer-actions button.btn-done {
  background: var(--green); color: #fff; border-color: var(--green);
}
.sig-drawer .drawer-status {
  font-size: 12px; color: var(--gray); flex: 1;
}
.sig-drawer .drawer-status.has-sig { color: var(--green); font-weight: 600; }

body { padding-bottom: 90px; }

/* ================================================================
   ATTESTATION: compact 2-column offense lists
================================================================ */
.offense-list-compact {
  columns: 2;
  column-gap: 16px;
  font-size: 8pt;
  line-height: 1.35;
}
.offense-list-compact li {
  margin-bottom: 2px;
  font-size: 8pt;
  page-break-inside: avoid;
}

/* ================================================================
   RATING GRID
================================================================ */
.rating-grid { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
.rating-grid th, .rating-grid td {
  border: 1px solid #d0d0d0; padding: 4px 6px; font-size: 9pt;
}
.rating-grid th {
  background: var(--green-light); color: var(--green);
  font-weight: 600; text-align: center; font-size: 8pt;
  text-transform: uppercase;
}
.rating-grid td:first-child { font-weight: 500; }
.rating-grid td:not(:first-child) { text-align: center; width: 70px; }

/* ================================================================
   COVER PAGE
================================================================ */
.cover-center {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 8in; text-align: center;
}
.cover-org {
  font-size: 24pt; font-weight: 700; color: var(--green);
  margin-bottom: 8px;
}
.cover-divider {
  width: 200px; height: 3px; background: var(--green);
  margin: 16px auto;
}
.cover-title {
  font-size: 18pt; font-weight: 600; color: var(--ink);
  margin-bottom: 24px;
}
.cover-meta {
  font-size: 11pt; color: var(--gray); margin-bottom: 6px;
}
.cover-meta strong { color: var(--ink); }

.toc { text-align: left; max-width: 460px; margin: 30px auto 0; }
.toc-title { font-size: 11pt; font-weight: 700; color: var(--green); margin-bottom: 8px; }
.toc-item {
  display: flex; justify-content: space-between;
  padding: 3px 0; font-size: 9.5pt; border-bottom: 1px dotted #ddd;
}

/* ================================================================
   UTILITIES
================================================================ */
.spacer-sm { height: 8px; }
.spacer-md { height: 16px; }
.spacer-lg { height: 24px; }
.bold { font-weight: 700; }
.underline { text-decoration: underline; }
.text-center { text-align: center; }
.text-green { color: var(--green); }
.text-small { font-size: 9pt; }
.text-xs { font-size: 8pt; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mb-1 { margin-bottom: 8px; }
.mb-2 { margin-bottom: 16px; }
.no-break { page-break-inside: avoid; }

/* ================================================================
   LOADING / ERROR
================================================================ */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,.95);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 9999;
}
.loading-overlay .spinner {
  width: 40px; height: 40px; border: 3px solid var(--green-light);
  border-top-color: var(--green); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { margin-top: 12px; color: var(--gray); font-size: 13px; }

.error-banner {
  background: #fdecea; color: #b71c1c; padding: 20px;
  text-align: center; margin: 40px auto; max-width: 500px;
  border-radius: 8px; font-size: 14px;
}

/* ================================================================
   UPLOAD MODAL
================================================================ */
.upload-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 2000;
}
.upload-modal {
  background: #fff; border-radius: 10px; padding: 28px;
  max-width: 540px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.upload-modal h2 {
  font-size: 16px; color: var(--green); margin-bottom: 16px;
}
.upload-modal label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--gray); margin-bottom: 4px; margin-top: 12px;
}
.upload-modal select, .upload-modal input[type="file"] {
  width: 100%; padding: 8px; border: 1px solid var(--border);
  border-radius: 6px; font-family: inherit; font-size: 13px;
}
.upload-modal .upload-btn {
  margin-top: 16px; background: var(--green); color: #fff;
  border: none; padding: 10px 24px; border-radius: 6px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; width: 100%;
}
.upload-modal .upload-btn:hover { background: var(--green-mid); }
.upload-modal .upload-btn:disabled { opacity: .5; cursor: not-allowed; }
.upload-modal .cancel-btn {
  margin-top: 8px; background: none; color: var(--gray);
  border: 1px solid var(--border); padding: 8px 24px; border-radius: 6px;
  font-family: inherit; font-size: 13px; cursor: pointer; width: 100%;
}
.uploaded-docs-list {
  margin-top: 16px; border-top: 1px solid #eee; padding-top: 12px;
}
.uploaded-docs-list h3 {
  font-size: 13px; color: var(--green); margin-bottom: 8px;
}
.uploaded-doc-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px;
}
.uploaded-doc-item .doc-name { font-weight: 600; color: var(--ink); }
.uploaded-doc-item .doc-date { color: var(--gray-light); font-size: 11px; }
</style>
</head>
<body>

<!-- TOOLBAR (screen only) -->
<div class="toolbar no-print" id="toolbar">
  <h1>Employee Credential File</h1>
  <span class="status" id="toolbarStatus">Loading...</span>
  <button onclick="uploadModal()">Upload Signed Document</button>
  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="window.print()">Print All</button>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>Loading hiring package...</p>
</div>

<!-- CONTENT -->
<div id="documentContent"></div>

<!-- GLOBAL SIGNATURE DRAWER (fixed at bottom) -->
<div class="sig-drawer no-print" id="sigDrawer">
  <button class="drawer-toggle" onclick="toggleDrawer()">Signature Pad</button>
  <canvas id="globalSigCanvas" width="500" height="150"></canvas>
  <div class="drawer-actions">
    <button onclick="clearGlobalSig()">Clear</button>
    <button class="btn-done" onclick="lockGlobalSig()">Done</button>
  </div>
  <div class="drawer-status" id="drawerStatus">Draw your signature above, then click "Done" to lock it in.</div>
</div>

<!-- UPLOAD MODAL (hidden) -->
<div class="upload-modal-overlay" id="uploadModalOverlay" style="display:none">
  <div class="upload-modal">
    <h2>Upload Signed Document</h2>
    <label for="uploadDocName">Document Name</label>
    <select id="uploadDocName"></select>
    <label for="uploadFile">File (PDF, PNG, JPEG — max 20 MB)</label>
    <input type="file" id="uploadFile" accept=".pdf,.png,.jpg,.jpeg">
    <button class="upload-btn" id="uploadBtn" onclick="doUpload()">Upload</button>
    <button class="cancel-btn" onclick="closeUploadModal()">Cancel</button>
    <div class="uploaded-docs-list" id="uploadedDocsList"></div>
  </div>
</div>

<script>
/* ================================================================
   GLOBALS
================================================================ */
let PKG = null;
let SETTINGS = {};
let SIGNATURES = [];
let UPLOADED_DOCS = [];
let TOKEN = '';
let PKG_ID = '';
let globalSigData = null; // base64 PNG once locked
let drawerCollapsed = false;

/* ================================================================
   GLOBAL SIGNATURE PAD
================================================================ */
const globalCanvas = document.getElementById('globalSigCanvas');
const globalCtx = globalCanvas.getContext('2d');
let drawing = false;

globalCtx.lineWidth = 2;
globalCtx.lineCap = 'round';
globalCtx.strokeStyle = '#1a1714';

globalCanvas.addEventListener('mousedown', e => { drawing = true; const r = globalCanvas.getBoundingClientRect(); globalCtx.beginPath(); globalCtx.moveTo(e.clientX - r.left, e.clientY - r.top); });
globalCanvas.addEventListener('mousemove', e => { if (!drawing) return; const r = globalCanvas.getBoundingClientRect(); globalCtx.lineTo(e.clientX - r.left, e.clientY - r.top); globalCtx.stroke(); });
globalCanvas.addEventListener('mouseup', () => drawing = false);
globalCanvas.addEventListener('mouseleave', () => drawing = false);
globalCanvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; const r = globalCanvas.getBoundingClientRect(); drawing = true; globalCtx.beginPath(); globalCtx.moveTo(t.clientX - r.left, t.clientY - r.top); });
globalCanvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const t = e.touches[0]; const r = globalCanvas.getBoundingClientRect(); globalCtx.lineTo(t.clientX - r.left, t.clientY - r.top); globalCtx.stroke(); });
globalCanvas.addEventListener('touchend', e => { e.preventDefault(); drawing = false; });

function isCanvasEmpty() {
  const d = globalCtx.getImageData(0, 0, globalCanvas.width, globalCanvas.height).data;
  return !d.some((v, i) => i % 4 === 3 && v > 0);
}

function clearGlobalSig() {
  globalCtx.clearRect(0, 0, globalCanvas.width, globalCanvas.height);
  globalSigData = null;
  document.getElementById('drawerStatus').textContent = 'Draw your signature above, then click "Done" to lock it in.';
  document.getElementById('drawerStatus').className = 'drawer-status';
}

function lockGlobalSig() {
  if (isCanvasEmpty()) { alert('Please draw your signature first.'); return; }
  globalSigData = globalCanvas.toDataURL('image/png');
  document.getElementById('drawerStatus').textContent = 'Signature locked. Click "Apply Signature" on any line to stamp it.';
  document.getElementById('drawerStatus').className = 'drawer-status has-sig';
}

function toggleDrawer() {
  drawerCollapsed = !drawerCollapsed;
  document.getElementById('sigDrawer').classList.toggle('collapsed', drawerCollapsed);
}

/* ================================================================
   APPLY SIGNATURE TO A LINE
================================================================ */
async function applySig(uid, docName, label) {
  if (!globalSigData) {
    alert('Please draw and lock your signature in the pad at the bottom of the screen first.');
    return;
  }

  try {
    const res = await fetch('/api/signatures', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        signer_name: candidateName(),
        signer_role: label,
        entity_type: 'hiring_package',
        entity_id: Number(PKG_ID),
        document_name: docName,
        signature_data: globalSigData
      })
    });
    if (!res.ok) throw new Error('Failed to save signature');
    const result = await res.json();

    // Hide placeholder, show applied
    const block = document.getElementById('sig_' + uid);
    if (block) {
      block.querySelector('.sig-placeholder').style.display = 'none';
      const applied = block.querySelector('.sig-applied');
      applied.style.display = 'flex';
      applied.querySelector('.sig-img').src = globalSigData;
      applied.querySelector('.sig-verify').textContent =
        'Verified: ' + (result.verification_code || result.signature_hash?.substring(0,12).toUpperCase() || '') + ' | ' + new Date().toLocaleString();
    }

    // Fill date
    const dateEl = document.getElementById('date_' + uid);
    if (dateEl) {
      const di = dateEl.querySelector('.field-input');
      if (di) di.textContent = new Date().toLocaleDateString();
    }
  } catch (err) {
    alert('Error saving signature: ' + err.message);
  }
}

/* ================================================================
   INIT
================================================================ */
(async function init() {
  const params = new URLSearchParams(window.location.search);
  PKG_ID = params.get('id');
  TOKEN = params.get('token');
  if (!PKG_ID || !TOKEN) {
    showError('Missing package ID or authentication token in URL.');
    return;
  }
  try {
    const headers = { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' };
    const [pkgRes, settingsRes, sigsRes, docsRes] = await Promise.all([
      fetch('/api/hiring/packages/' + PKG_ID, { headers }),
      fetch('/api/settings', { headers }),
      fetch('/api/signatures/hiring_package/' + PKG_ID, { headers }),
      fetch('/api/hiring/packages/' + PKG_ID + '/documents', { headers }).catch(() => null)
    ]);
    if (!pkgRes.ok) throw new Error('Failed to load package (HTTP ' + pkgRes.status + ')');
    if (!settingsRes.ok) throw new Error('Failed to load settings');

    PKG = await pkgRes.json();
    SETTINGS = await settingsRes.json();

    document.getElementById('toolbarStatus').textContent = PKG.candidate_name + ' — ' + (PKG.position || 'N/A');

/* ================================================================
   PDF DOWNLOAD (jsPDF + html2canvas)
================================================================ */
async function downloadPDF() {
  const toolbar = document.getElementById('toolbar');
  const drawer = document.getElementById('sigDrawer');
  toolbar.style.display = 'none';
  drawer.style.display = 'none';
  document.body.style.paddingTop = '0';
  document.body.style.paddingBottom = '0';
  document.body.style.background = '#fff';

  // Hide all apply buttons
  document.querySelectorAll('.btn-apply-sig').forEach(b => b.style.display = 'none');

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'in', format: 'letter' });
  const sections = document.querySelectorAll('.doc-section');
  let first = true;

  for (const section of sections) {
    if (!first) pdf.addPage();
    first = false;
    const canvas = await html2canvas(section, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const pageW = 8.5;
    const pageH = 11;
    const imgW = pageW;
    const imgH = (canvas.height * imgW) / canvas.width;

    if (imgH <= pageH) {
      pdf.addImage(imgData, 'JPEG', 0, 0, imgW, imgH);
    } else {
      // Scale to fit
      const scale = pageH / imgH;
      pdf.addImage(imgData, 'JPEG', 0, 0, imgW * scale, pageH);
    }
  }

  const name = (candidateName() || 'Candidate').replace(/\s+/g, '_');
  pdf.save('Hiring_Package_' + name + '.pdf');

  // Restore UI
  toolbar.style.display = '';
  drawer.style.display = '';
  document.body.style.paddingTop = '';
  document.body.style.paddingBottom = '';
  document.body.style.background = '';
  document.querySelectorAll('.btn-apply-sig').forEach(b => b.style.display = '');
}

function populateDocDropdown() {

  sel.innerHTML = '';
  const docs = [
    'Employment Application', 'Emergency Contact Information', 'Reference Form',
    'Attestation of Compliance', 'Employee Code of Conduct', 'Personnel Policies',
    'Employee Acknowledgment Form', 'Abuse and Neglect Statement',
    'Confidential Affairs Agreement', 'Privacy Policy Acknowledgment',
    'HIPAA Compliance Form', 'Drug-Free Workplace Acknowledgment',
    'TB Screening Declaration', 'Hepatitis B Vaccination Declaration',
    'Bloodborne Pathogen Training Acknowledgment', 'CPR/BLS Certification Acknowledgment',
    'Supervision Agreement', 'Independent Contractor Information',
    'Offer of Employment', 'Acceptance of Employment',
    'W-4 Tax Withholding', 'W-9 Taxpayer Identification',
    'I-9 Employment Eligibility', 'Direct Deposit Authorization',
    'Phase Completion Sign-Off'
  ];
  docs.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
}

function renderUploadedDocs() {
  const container = document.getElementById('uploadedDocsList');
  if (!UPLOADED_DOCS || UPLOADED_DOCS.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:var(--gray-light);padding:8px 0;">No uploaded documents yet.</div>';
    return;
  }
  let html = '<h3>Previously Uploaded</h3>';
  UPLOADED_DOCS.forEach(d => {
    html += `<div class="uploaded-doc-item">
      <span class="doc-name">${esc(d.document_name || d.name || 'Document')}</span>
      <span class="doc-date">${d.uploaded_at ? new Date(d.uploaded_at).toLocaleDateString() : ''}</span>
    </div>`;
  });
  container.innerHTML = html;
}

async function doUpload() {
  const docName = document.getElementById('uploadDocName').value;
  const fileInput = document.getElementById('uploadFile');
  if (!fileInput.files.length) { alert('Please select a file.'); return; }
  const file = fileInput.files[0];
  if (file.size > 20 * 1024 * 1024) { alert('File exceeds 20 MB limit.'); return; }

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  try {
    const formData = new FormData();
    formData.append('document_name', docName);
    formData.append('file', file);
    const res = await fetch('/api/hiring/packages/' + PKG_ID + '/documents', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN },
      body: formData
    });
    if (!res.ok) throw new Error('Upload failed (HTTP ' + res.status + ')');
    const result = await res.json();
    UPLOADED_DOCS.push(result);
    renderUploadedDocs();
    fileInput.value = '';
    alert('Document uploaded successfully.');
  } catch (err) {
    alert('Error uploading: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Upload';
  }
}

  h += `<div class="form-section"><div class="section-title">Employee Handbook Receipt</div>
  <div class="legal-text">I acknowledge that my employment with ${esc(orgName())} is at-will. This means that either I or the company may terminate the employment relationship at any time, with or without cause, and with or without notice.</div></div>`;

  h += `<div class="doc-title-sm">Personnel Policies (continued)</div>`;

  h += `<div class="form-section"><div class="section-title">Pledge of Confidentiality — Protected Health Information</div>
  <div class="legal-text">I understand that in the course of my employment with ${esc(orgName())}, I may have access to Protected Health Information (PHI) as defined by the Health Insurance Portability and Accountability Act (HIPAA). I pledge to maintain the confidentiality and security of all PHI and to access, use, or disclose such information only as necessary to perform my assigned duties. I understand that my obligations regarding the protection of PHI continue even after my employment ends. I further understand that unauthorized access, use, or disclosure of PHI may result in disciplinary action, up to and including termination, as well as civil and criminal penalties.</div></div>`;

  <div class="legal-text">All electronic equipment, systems, and communications tools provided by ${esc(orgName())} are company property and are intended for business use. The company reserves the right to inspect, monitor, and access all data, files, and communications stored on or transmitted through company equipment at any time, without prior notice.</div></div>`;

  <div class="legal-text">All employees are expected to maintain a professional appearance and adhere to standards of personal hygiene appropriate to their role and work environment. Specific dress code requirements may be established by department or position.</div></div>`;

  <div class="legal-text">Employees may be required to participate in continuing education (CE) programs, in-service training, and staff development activities as determined by ${esc(orgName())}. This includes, but is not limited to, training on harassment prevention, workplace safety, and regulatory compliance.</div></div>`;

  h += `<div class="form-section"><div class="section-title">Staff Safety</div>
  <div class="legal-text">I acknowledge that I have received training on workplace safety procedures, emergency protocols, and the proper use of equipment and materials as applicable to my position.</div></div>`;

  h += `<div class="form-section"><div class="section-title">Certification of Authenticity</div>
  <div class="legal-text">I certify that all information provided in my application for employment and during the hiring process is true and correct to the best of my knowledge. I authorize ${esc(orgName())} to investigate all statements made in my application and to contact any references, previous employers, or educational institutions listed. I understand that any misrepresentation or omission of facts may result in rejection of my application or termination of my employment.</div></div>`;

  h += `<div class="spacer-md"></div>`;
  h += `<div class="legal-text"><strong>Mandatory Reporting Requirement:</strong> All employees of ${esc(orgName())} are mandatory reporters. If you know or have reasonable cause to suspect that a client has been or is being abused, neglected, or exploited, you are required by law to report it immediately.</div>`;
  h += `<div class="spacer-sm"></div>`;

  h += `<div class="legal-text"><strong>Florida Abuse Hotline:</strong> 1-800-96-ABUSE (1-800-962-2873)<br>
  <strong>Fax:</strong> 1-800-914-0004<br>
  <strong>Online Reporting:</strong> reportabuse.dcf.state.fl.us</div>`;

  h += `<div class="spacer-sm"></div>`;
  h += `<div class="legal-text">Pursuant to Section 39.203(1)(a), Florida Statutes, any person who reports in good faith any known or suspected case of abuse, neglect, or exploitation is immune from any civil or criminal liability.</div>`;
  h += `<div class="spacer-sm"></div>`;
  h += `<div class="legal-text">Pursuant to Section 39, Florida Statutes, mandatory reporters who fail to report known or suspected abuse, neglect, or exploitation are subject to penalties. Pursuant to Sections 402.301-319, Florida Statutes, any person who knowingly and willfully makes a false report of abuse, neglect, or exploitation commits a felony of the third degree.</div>`;

      h += `</div>`;
    }
  } else {
    for (let p = 1; p <= 3; p++) {
      h += `<div class="form-section no-break"><div class="section-title">Phase ${p}</div>`;
      h += `<div class="field-row">${checkbox('All items completed', false)}</div>`;
      h += `<div class="field-row">${checkbox('All documents collected and filed', false)}</div>`;
      h += `<div class="field-row">${checkbox('Waived items documented with justification', false)}</div>`;
      h += sigBlock('Phase ' + p + ' Sign-Off', 'HR Signature — Phase ' + p, 'Date');
      h += `</div>`;
    }
  }

  h += `<div class="sig-block-area">`;
  h += `<div class="section-title">Final Approval</div>`;
  h += `<div class="legal-text">By signing below, we certify that all hiring requirements have been satisfactorily completed for this candidate.</div>`;
  h += sigBlock('Phase Completion Final', 'Employee Signature', 'Date');
  h += sigBlock('Phase Completion Final', 'Human Resources Signature', 'Date');
  h += sigBlock('Phase Completion Final', 'Supervisor Signature', 'Date');
  h += sigBlock('Phase Completion Final', 'Medical Director Signature', 'Date');
  h += `</div>`;

  h += `${pageFooter('Phase Completion Sign-Off')}</section>`;
  return h;
}

/* ================================================================
   ROLE HELPERS
================================================================ */
function isContractedRole() {
  const rt = (PKG.role_type || '').toLowerCase();
  const pos = (PKG.position || '').toLowerCase();
  return rt.includes('contract') || rt.includes('subcontract') || pos.includes('contractor') || rt === '1099';
}

function isInternRole() {
  const rt = (PKG.role_type || '').toLowerCase();
  const pos = (PKG.position || '').toLowerCase();
  return rt === 'intern' || rt.includes('intern') || pos.includes('intern');
}
